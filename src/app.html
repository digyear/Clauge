<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			#zeroany-workbench-splash {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				/* Match icon card gradient (#1a1040 → #060414) so card blends into bg */
				background: radial-gradient(ellipse at 35% 25%, #1a1040 0%, #060414 80%);
				z-index: 9999;
				transition: opacity 0.3s ease;
				pointer-events: none;
			}
			#zeroany-workbench-splash.fade-out { opacity: 0; }
			#zeroany-workbench-splash img {
				width: 180px;
				height: 180px;
				pointer-events: none;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="zeroany-workbench-splash"><img src="/zeroany-workbench-icon.svg" alt="" aria-hidden="true" /></div>
		<script>
			// The transparent widget window must never flash the dark splash,
			// and needs a root class so its CSS can out-rank the opaque
			// body background from app.css.
			if (location.pathname.startsWith("/widget")) {
				document.documentElement.classList.add("widget-window");
				document.getElementById("zeroany-workbench-splash").remove();
			}
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
