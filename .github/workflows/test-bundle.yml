name: Test Bundle

# Manually-triggered bundle build. Produces installers as 14-day workflow
# artifacts without creating a GitHub release. Use this to verify the
# bundle pipeline (or test a build on a real OS) before committing to a
# tagged release.
#
# Trigger from Actions tab → Test Bundle → Run workflow.
# Or via CLI: gh workflow run test-bundle.yml --ref <branch> -f platforms=all

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: Which platforms to build
        type: choice
        options:
          - all
          - macos
          - windows
          - windows-arm
          - linux
          - linux-arm
        default: all

jobs:
  # GitHub Actions doesn't let you reference `matrix.*` in a job-level
  # `if:`. So we generate the matrix dynamically here based on the
  # selected platforms input — only the chosen runners spin up.
  plan:
    runs-on: ubuntu-latest
    outputs:
      includes: ${{ steps.set.outputs.includes }}
    steps:
      - id: set
        shell: bash
        run: |
          MAC_AARCH64='{"platform":"macos-latest","args":"--target aarch64-apple-darwin","rust-targets":"aarch64-apple-darwin","label":"macos-aarch64"}'
          MAC_X86='{"platform":"macos-latest","args":"--target x86_64-apple-darwin","rust-targets":"x86_64-apple-darwin","label":"macos-x86_64"}'
          WIN='{"platform":"windows-latest","args":"","rust-targets":"","label":"windows-x64"}'
          WIN_ARM='{"platform":"windows-11-arm","args":"--target aarch64-pc-windows-msvc","rust-targets":"aarch64-pc-windows-msvc","label":"windows-arm64"}'
          LINUX='{"platform":"ubuntu-22.04","args":"","rust-targets":"","label":"linux-x64"}'
          LINUX_ARM='{"platform":"ubuntu-22.04-arm","args":"","rust-targets":"","label":"linux-arm64"}'

          case "${{ inputs.platforms }}" in
            macos)       INCLUDES="[$MAC_AARCH64,$MAC_X86]" ;;
            windows)     INCLUDES="[$WIN]" ;;
            windows-arm) INCLUDES="[$WIN_ARM]" ;;
            linux)       INCLUDES="[$LINUX]" ;;
            linux-arm)   INCLUDES="[$LINUX_ARM]" ;;
            *)           INCLUDES="[$MAC_AARCH64,$MAC_X86,$WIN,$WIN_ARM,$LINUX,$LINUX_ARM]" ;;
          esac

          echo "includes=$INCLUDES" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.includes) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libdbus-1-dev \
            libsecret-1-dev \
            libasound2-dev \
            patchelf \
            pkg-config \
            rpm

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install

      - name: Configure clang-cl for whisper.cpp (Windows ARM)
        if: matrix.platform == 'windows-11-arm'
        shell: pwsh
        run: |
          # ggml rejects MSVC on ARM ("MSVC is not supported for ARM, use
          # clang"), so whisper-rs-sys must build whisper.cpp with clang-cl.
          # The windows-11-arm runner image ships LLVM + Ninja preinstalled.
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path "$llvmBin\clang-cl.exe")) {
            Write-Error "clang-cl.exe not found at $llvmBin — runner image change?"
            exit 1
          }
          Add-Content -Path $env:GITHUB_PATH -Value $llvmBin
          # cmake-rs resolves CC/CXX by name, so clang-cl must be on PATH.
          Add-Content -Path $env:GITHUB_ENV -Value "CC=clang-cl"
          Add-Content -Path $env:GITHUB_ENV -Value "CXX=clang-cl"
          # ggml uses C++ exceptions; cmake-rs disables them under clang-cl.
          Add-Content -Path $env:GITHUB_ENV -Value "CXXFLAGS=/EHsc"
          # cmake-rs's default Visual Studio generator injects its own -T/-A
          # flags that pin the MSVC toolset; Ninja honors CC/CXX instead.
          # Do NOT set CMAKE_GENERATOR_TOOLSET — Ninja rejects toolset specs.
          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_GENERATOR=Ninja"

      - name: Import Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH > /dev/null 2>&1
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH > /dev/null 2>&1
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "Certificate imported successfully"

      - name: Drop stale whisper CMake cache (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # windows-latest's Visual Studio version can change between cache
          # save and restore (e.g. VS 17 2022 -> VS 18 2026). cmake-rs reuses
          # the cached whisper-rs-sys build dir and aborts on a generator
          # mismatch, so drop its build + fingerprint and let it regenerate.
          # (windows-11-arm is immune — it builds whisper with Ninja.)
          foreach ($profile in @("debug", "release")) {
            foreach ($sub in @("build", ".fingerprint")) {
              $dir = "src-tauri/target/$profile/$sub"
              if (Test-Path $dir) {
                Get-ChildItem $dir -Directory -Filter "whisper-rs-sys-*" -ErrorAction SilentlyContinue |
                  ForEach-Object { Remove-Item -Recurse -Force $_.FullName -ErrorAction SilentlyContinue }
              }
            }
          }

      - name: Build app
        # tauri-action with no tagName just runs tauri build — no release is
        # created. Signs AND notarizes the macOS bundle (same Apple env as
        # publish.yml) so this pre-release smoke test matches the shipped
        # artifact: a notarized, Gatekeeper-clean DMG. Windows NSIS still
        # trips SmartScreen (no EV cert) — unchanged.
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: clauge-${{ matrix.label }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/rpm/*.rpm
          retention-days: 14
          if-no-files-found: warn
